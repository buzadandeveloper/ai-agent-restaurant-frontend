pre-commit:
  parallel: false
  commands:
    biome:
      run: pnpm lint {staged_files}
      glob: "src/**/*.{ts,tsx,js,json}"
      exclude: "src/components/ui/**/*"
      stage_fixed: true
    tsc:
      run: pnpm typecheck
      glob: "src/**/*.{ts,tsx}"
      exclude: "src/components/ui/**/*"

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit $1